apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: traefik-web-apps-ingress
  namespace: default
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: default-strip-prefix@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: ket.stravixglobaltech.com
      http:
        paths:
          - path: /nginx
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 80
          - path: /httpd
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
